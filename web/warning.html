<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saturday Intercept</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body class="warning-page">
    <main class="warning-shell">
      <header class="intercept-topbar">
        <div>
          <p class="eyebrow">runner-mode intercept</p>
          <strong>Saturday Browser Guard</strong>
        </div>
        <span id="warningSource" class="badge bad">analyzing</span>
      </header>

      <section class="intercept-board">
        <div class="intercept-visual" aria-hidden="true">
          <div class="signal-card">
            <span>risk</span>
            <strong id="visualRisk">--</strong>
          </div>
          <div
            class="mascot-viewer warning-mascot"
            data-model="/asset/player1.glb"
            data-animation="runlookback,run,idle"
            data-model-yaw="-0.2"
            data-camera-yaw="0.22"
            data-camera-pitch="0.04"
            data-target-y="1.85"
            data-frame-scale="3.6"
          >
            <img class="model-fallback" src="/assets/mascot.svg" alt="">
          </div>
        </div>

        <article class="intercept-copy">
          <p class="eyebrow">security alert</p>
          <h1>Suspicious Website Detected</h1>
          <p id="warningSummary" class="warning-summary">Saturday is checking this route before you continue.</p>

          <div class="url-box">
            <span>Detected URL</span>
            <strong id="detectedUrl">--</strong>
          </div>

          <div class="risk-meter">
            <div>
              <span>Risk Score</span>
              <strong id="riskScore">--</strong>
            </div>
            <div class="meter"><i id="riskBar"></i></div>
          </div>

          <div class="intel-grid">
            <div class="intel-box">
              <span>Severity</span>
              <strong id="warningSeverity">--</strong>
            </div>
            <div class="intel-box">
              <span>Agent</span>
              <strong id="warningAgent">Saturday</strong>
            </div>
            <div class="intel-box">
              <span>Action</span>
              <strong id="warningAction">Block</strong>
            </div>
          </div>

          <div id="officialBox" class="official-box hidden">
            <span>Official route</span>
            <strong id="officialUrl"></strong>
          </div>

          <ul id="warningReasons" class="warning-reasons"></ul>

          <div class="warning-actions">
            <button id="leaveSite" class="primary-btn">Leave Site</button>
            <button id="continueSite" class="danger-btn">Continue Anyway</button>
          </div>
        </article>
      </section>
    </main>

    <script type="module" src="/mascot-viewer.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const targetUrl = params.get("url") || "https://secure-login.sentinelai-verification.com/auth/login";
      const detectedUrl = document.getElementById("detectedUrl");
      const riskScore = document.getElementById("riskScore");
      const visualRisk = document.getElementById("visualRisk");
      const riskBar = document.getElementById("riskBar");
      const warningSummary = document.getElementById("warningSummary");
      const warningSource = document.getElementById("warningSource");
      const warningSeverity = document.getElementById("warningSeverity");
      const warningAgent = document.getElementById("warningAgent");
      const warningAction = document.getElementById("warningAction");
      const officialBox = document.getElementById("officialBox");
      const officialUrl = document.getElementById("officialUrl");
      const reasons = document.getElementById("warningReasons");
      detectedUrl.textContent = targetUrl;

      async function loadRisk() {
        const response = await fetch("/api/check-url", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({url: targetUrl, source: params.get("from") === "extension" ? "extension" : "dashboard"})
        });
        const data = await response.json();
        const hackarena = data.hackarena || null;
        riskScore.textContent = `${data.risk_score}/100`;
        visualRisk.textContent = data.risk_score;
        riskBar.style.width = `${Math.max(8, data.risk_score)}%`;
        warningSeverity.textContent = hackarena?.threat_severity || (data.risk_score >= 85 ? "CRITICAL" : data.risk_score >= 70 ? "HIGH" : "MEDIUM");
        warningAgent.textContent = hackarena?.assigned_agent || "Saturday Risk Engine";
        warningAction.textContent = data.allow_navigation ? "Allowed once" : "Block";
        warningSource.textContent = hackarena ? "HackArena intel" : "Saturday rules";
        warningSource.className = `badge ${data.risk_score >= 70 ? "bad" : "warn"}`;
        warningSummary.textContent = hackarena
          ? "HackArena threat intelligence confirmed this route as malicious."
          : data.brand
            ? `This website appears to impersonate ${data.brand}.`
            : "This website has enough suspicious signals that Saturday paused navigation.";

        if (data.official_url) {
          officialBox.classList.remove("hidden");
          officialUrl.textContent = data.official_url;
        }

        reasons.innerHTML = "";
        for (const reason of data.reasons || []) {
          const item = document.createElement("li");
          item.textContent = reason;
          reasons.appendChild(item);
        }
      }

      document.getElementById("leaveSite").addEventListener("click", () => {
        location.href = "/";
      });

      document.getElementById("continueSite").addEventListener("click", async () => {
        await fetch("/api/allow-once", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({url: targetUrl})
        });
        location.href = targetUrl;
      });

      loadRisk().catch(() => {
        warningSummary.textContent = "Saturday could not reach the local risk engine, so it recommends leaving this site.";
        warningSource.textContent = "offline";
        warningSeverity.textContent = "UNKNOWN";
      });
    </script>
  </body>
</html>

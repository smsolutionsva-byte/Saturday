<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        color: #111827;
        background: #f6f8fb;
        font-family: Inter, ui-sans-serif, system-ui, "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 1.35rem;
      }
      p {
        margin: 0 0 12px;
        color: #5b6577;
        line-height: 1.45;
      }
      .status {
        border-radius: 8px;
        padding: 10px;
        background: #fff;
        font-weight: 800;
      }
      button {
        width: 100%;
        min-height: 38px;
        margin-top: 8px;
        border: 0;
        border-radius: 6px;
        color: #101620;
        background: #ffd34d;
        font-weight: 900;
        cursor: pointer;
      }
      button.secondary {
        background: #e8eef6;
      }
    </style>
  </head>
  <body>
    <h1>Saturday</h1>
    <p>Local browser guard for suspicious routes.</p>
    <div id="status" class="status">Checking local engine...</div>
    <button id="openDashboard">Open Dashboard</button>
    <button id="demoWarning" class="secondary">Test Warning</button>
    <script src="popup.js"></script>
  </body>
</html>
